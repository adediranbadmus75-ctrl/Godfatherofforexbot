services:
  - type: worker
    name: telegram-member-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: USER_ID
        sync: false
    pythonVersion: 3.11.9
