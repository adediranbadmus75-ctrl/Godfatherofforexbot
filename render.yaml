services:
  - type: worker
    name: telegram-member-monitor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0
      - key: BOT_TOKEN
        sync: false
      - key: USER_ID
        sync: false
      - key: CHANNEL_ID
        sync: false
